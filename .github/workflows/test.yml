name: Test

on:
  pull_request:
    paths:
      - 'default/**'
      - 'data/samples/**'
      - 'tests/**'
      - 'package.json'
      - '.github/workflows/test.yml'
  push:
    branches: [main]

permissions:
  contents: read

jobs:
  test:
    # Pinned to feature/ts-pivot until dryvist/cc-edge-pack-template#3 lands.
    # Flip to @main as soon as that PR merges.
    uses: dryvist/cc-edge-pack-template/.github/workflows/cribl-pack-test.yml@feature/ts-pivot
    with:
      pack_type: edge

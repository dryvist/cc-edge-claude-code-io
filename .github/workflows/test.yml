name: Test

on:
  pull_request:
    paths:
      - 'default/**'
      - 'data/samples/**'
      - 'tests/**'
      - 'package.json'
      - '.github/workflows/test.yml'
  push:
    branches: [main]

permissions:
  contents: read

jobs:
  test:
    uses: dryvist/cc-edge-pack-template/.github/workflows/cribl-pack-test.yml@main
    with:
      pack_type: edge

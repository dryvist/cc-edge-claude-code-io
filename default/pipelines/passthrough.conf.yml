output: default
streamtags: []
groups: {}
asyncFuncTimeout: 1000
description: >-
  Demo passthrough pipeline from the pack template. Stamps Splunk-canonical
  fields (sourcetype, index, datatype) on every event. Replaced by the
  canonical Claude Code pipelines when the content migration (issue #7) lands.
functions:
  - id: eval
    filter: "true"
    disabled: false
    conf:
      add:
        - name: sourcetype
          value: "'cribl:demo'"
        - name: index
          value: "'main'"
        - name: datatype
          value: "'cribl-demo'"

id: default
groups: {}
comments: []
routes:
  # Demo route from the pack template. Replaced by the canonical Claude Code
  # routes when the content migration (issue #7) lands.
  # Validator rules:
  #   - id and pipeline must be descriptive (no 'main', no 'route1')
  #   - filter must be a real expression (not literally 'false' / '0')
  #   - output MUST be __group (not input_id)
  - id: passthrough
    name: Demo Passthrough
    final: true
    disabled: false
    pipeline: passthrough
    description: "Demo route — replaced by canonical routes in issue #7."
    enableOutputExpression: false
    targetContext: group
    filter: "datatype=='cribl-demo'"
    clones: []
    output: __group
